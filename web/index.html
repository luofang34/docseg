<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>docseg — character segmentation demo</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.webgpu.min.js"></script>
</head>
<body>
  <header>
    <h1>docseg</h1>
    <label class="file">
      Open image
      <input id="file" type="file" accept="image/png,image/jpeg" multiple />
    </label>
    <button id="export" disabled>Export zip</button>
    <div class="tool-palette">
      <button id="tool-select" class="mode-btn mode-active" title="Select (V)">Select</button>
      <button id="tool-add" class="mode-btn" title="Add box (A)">+ Box</button>
      <button id="tool-delete" class="mode-btn" title="Delete (D)">− Box</button>
      <button id="tool-order" class="mode-btn" title="Draw order (O)">Order</button>
      <button id="tool-region" class="mode-btn" title="Draw region (R)">Region</button>
      <button id="tool-reset-order" class="mode-btn" title="Reset custom order">Reset order</button>
    </div>
    <label class="toggle">
      <input id="show-order" type="checkbox" checked />
      Show labels
    </label>
    <span id="status">initializing…</span>
  </header>
  <div id="banner" hidden></div>
  <div id="controls">
    <label>
      Direction
      <select id="direction">
        <option value="vertical-rtl" selected>Vertical RTL (Yi / classical CJK)</option>
        <option value="vertical-ltr">Vertical LTR</option>
        <option value="horizontal-ltr">Horizontal LTR</option>
      </select>
    </label>
    <label>
      Region threshold
      <span class="slider-wrap">
        <input id="region-threshold" type="range" min="0.2" max="0.9" step="0.05" value="0.4" />
        <span id="region-threshold-tick" class="inherited-tick" style="display:none"></span>
      </span>
      <output id="region-threshold-out">0.40</output>
    </label>
    <label>
      Affinity threshold
      <span class="slider-wrap">
        <input id="affinity-threshold" type="range" min="0.1" max="0.9" step="0.05" value="0.3" />
        <span id="affinity-threshold-tick" class="inherited-tick" style="display:none"></span>
      </span>
      <output id="affinity-threshold-out">0.30</output>
    </label>
    <label>
      Erosion (px)
      <span class="slider-wrap">
        <input id="erosion-px" type="range" min="0" max="4" step="1" value="0" />
        <span id="erosion-px-tick" class="inherited-tick" style="display:none"></span>
      </span>
      <output id="erosion-px-out">0</output>
    </label>
    <label>
      Min area (px)
      <span class="slider-wrap">
        <input id="min-area" type="range" min="1" max="64" step="1" value="8" />
        <span id="min-area-tick" class="inherited-tick" style="display:none"></span>
      </span>
      <output id="min-area-out">8</output>
    </label>
    <label class="toggle">
      <input id="axis-aligned" type="checkbox" checked />
      Axis-aligned boxes
    </label>
  </div>
  <div id="workspace">
    <aside id="filmstrip" aria-label="Page filmstrip"></aside>
    <main>
      <div id="canvas-wrap">
        <canvas id="canvas" width="0" height="0"></canvas>
      </div>
      <aside id="ribbon-wrap">
        <div id="ribbon-header">Reading order</div>
        <div id="ribbon"></div>
      </aside>
    </main>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
