name: Deploy docseg to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One deploy at a time, cancel any in-flight run when a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm32)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Run core tests
        run: cargo test --workspace --all-targets

      - name: Build wasm (release)
        run: wasm-pack build crates/docseg-web --target web --release --out-dir ../../web/pkg

      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          cp -R web/* deploy/
          # Leave deploy/models/ empty; the model is downloaded in the next
          # step so it ships same-origin (GH Release asset URLs don't serve
          # Access-Control-Allow-Origin, which breaks browser fetch()).
          rm -rf deploy/models
          mkdir -p deploy/models

      # Download the CRAFT ONNX from the Release pinned in the repo variable
      # and embed it in the deploy artifact so the browser fetches it from
      # the same origin (Pages). Avoids the CORS preflight failure on
      # release-assets.githubusercontent.com.
      - name: Bundle CRAFT ONNX into deploy artifact
        if: vars.DOCSEG_MODEL_URL != ''
        run: |
          curl -fL --retry 3 -o deploy/models/craft_mlt_25k.onnx "${{ vars.DOCSEG_MODEL_URL }}"
          ls -la deploy/models/craft_mlt_25k.onnx

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
